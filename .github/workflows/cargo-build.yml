name: Cargo-Build

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  release:
    types: [ "published" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-linux:
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@v4
    - name: Build
      run: cargo build --verbose --target x86_64-unknown-linux-gnu
    - name: Run tests
      run: cargo test --verbose
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: tiffiny-linux-x86_64
        path: target/x86_64-unknown-linux-gnu/debug/tiffiny

  build-linux-arm:
    runs-on: ubuntu-24.04-arm
    steps:
    - uses: actions/checkout@v4
    - name: Install Rust target
      run: rustup target add aarch64-unknown-linux-gnu
    - name: Build
      run: cargo build --verbose --target aarch64-unknown-linux-gnu
    - name: Run tests
      run: cargo test --verbose
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: tiffiny-linux-aarch64
        path: target/aarch64-unknown-linux-gnu/debug/tiffiny

  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install Rust targets
      run: |
        rustup target add x86_64-pc-windows-msvc
        rustup target add aarch64-pc-windows-msvc
    - name: Build (Windows x86_64)
      run: cargo build --verbose --target x86_64-pc-windows-msvc
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: tiffiny-windows-x86_64
        path: target/x86_64-pc-windows-msvc/debug/tiffiny.exe
    - name: Build (Windows aarch64)
      run: cargo build --verbose --target aarch64-pc-windows-msvc
    - name: Run tests
      run: cargo test --verbose
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: tiffiny-windows-aarch64
        path: target/aarch64-pc-windows-msvc/debug/tiffiny.exe

  release:
    if: github.event_name == 'release'
    needs: [build-linux, build-linux-arm, build-windows]
    runs-on: ubuntu-latest
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts
        pattern: tiffiny-*
        merge-multiple: true
    - name: Upload release assets
      uses: softprops/action-gh-release@v1
      with:
        files: |
          artifacts/tiffiny-linux-x86_64/tiffiny
          artifacts/tiffiny-linux-aarch64/tiffiny
          artifacts/tiffiny-windows-x86_64/tiffiny.exe
          artifacts/tiffiny-windows-aarch64/tiffiny.exe
        tag_name: ${{ github.ref_name }}
        name: ${{ github.event.release.name || github.ref_name }}
