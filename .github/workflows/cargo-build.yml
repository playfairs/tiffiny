name: Cargo-Build

permissions:
  contents: write

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  release:
    types: [ "published" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-linux:
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@v4
    - name: Build
      run: cargo build --verbose --target x86_64-unknown-linux-gnu
    - name: Run tests
      run: cargo test --verbose
    - name: Create AppImage
      run: |
        mkdir -p AppImageDir/usr/bin
        cp target/x86_64-unknown-linux-gnu/debug/tiffiny AppImageDir/usr/bin/
        cat > AppImageDir/tiffiny.desktop << 'EOF'
        [Desktop Entry]
        Type=Application
        Name=Tiffiny
        Comment=Audio to Image Converter
        Exec=tiffiny
        Icon=tiffiny
        Categories=AudioVideo;Audio;
        EOF
        wget https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
        chmod +x appimagetool-x86_64.AppImage
        ./appimagetool-x86_64.AppImage AppImageDir tiffiny-x86_64.AppImage
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: tiffiny-linux-x86_64
        path: |
          target/x86_64-unknown-linux-gnu/debug/tiffiny
          tiffiny-x86_64.AppImage

  build-linux-arm:
    runs-on: ubuntu-24.04-arm
    steps:
    - uses: actions/checkout@v4
    - name: Install Rust target
      run: rustup target add aarch64-unknown-linux-gnu
    - name: Build
      run: cargo build --verbose --target aarch64-unknown-linux-gnu
    - name: Run tests
      run: cargo test --verbose
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: tiffiny-linux-aarch64
        path: target/aarch64-unknown-linux-gnu/debug/tiffiny

  build-macos:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    - name: Build
      run: cargo build --verbose --target x86_64-apple-darwin
    - name: Run tests
      run: cargo test --verbose
    - name: Create DMG
      run: |
        mkdir -p dmg/Tiffiny.app/Contents/MacOS
        mkdir -p dmg/Tiffiny.app/Contents/Resources
        cp target/x86_64-apple-darwin/debug/tiffiny dmg/Tiffiny.app/Contents/MacOS/
        cat > dmg/Tiffiny.app/Contents/Info.plist << 'EOF'
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
        <key>CFBundleExecutable</key>
        <string>tiffiny</string>
        <key>CFBundleIdentifier</key>
        <string>com.tiffiny.app</string>
        <key>CFBundleName</key>
        <string>Tiffiny</string>
        <key>CFBundleVersion</key>
        <string>0.1.0</string>
        <key>CFBundlePackageType</key>
        <string>APPL</string>
        </dict>
        </plist>
        EOF
        hdiutil create -volname "Tiffiny" -srcfolder dmg -ov -format UDZO tiffiny-macos.dmg
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: tiffiny-macos
        path: |
          target/x86_64-apple-darwin/debug/tiffiny
          tiffiny-macos.dmg

  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install Rust targets
      run: |
        rustup target add x86_64-pc-windows-msvc
        rustup target add aarch64-pc-windows-msvc
    - name: Build (Windows x86_64)
      run: cargo build --verbose --target x86_64-pc-windows-msvc
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: tiffiny-windows-x86_64
        path: target/x86_64-pc-windows-msvc/debug/tiffiny.exe
    - name: Build (Windows aarch64)
      run: cargo build --verbose --target aarch64-pc-windows-msvc
    - name: Run tests
      run: cargo test --verbose
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: tiffiny-windows-aarch64
        path: target/aarch64-pc-windows-msvc/debug/tiffiny.exe

  release:
    if: github.event_name == 'release'
    needs: [build-linux, build-linux-arm, build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts
        pattern: tiffiny-*
        merge-multiple: true
    - name: Upload release assets
      uses: softprops/action-gh-release@v1
      with:
        files: |
          artifacts/tiffiny-linux-x86_64/tiffiny
          artifacts/tiffiny-linux-x86_64/tiffiny-x86_64.AppImage
          artifacts/tiffiny-linux-aarch64/tiffiny
          artifacts/tiffiny-windows-x86_64/tiffiny.exe
          artifacts/tiffiny-windows-aarch64/tiffiny.exe
          artifacts/tiffiny-macos/tiffiny
          artifacts/tiffiny-macos/tiffiny-macos.dmg
        tag_name: ${{ github.ref_name }}
        name: ${{ github.event.release.name || github.ref_name }}
